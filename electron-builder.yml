appId: com.ai-gui.desktop
productName: AI GUI
copyright: Copyright © 2025 AI GUI
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!**/.claude/*'
  - '!src/*'
  - '!docs/*'
  - '!out/*'
  - '!dist/*'
  - '!electron.vite.config.*'
  - '!vitest.config.*'
  - '!playwright.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md,CLAUDE.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{package-lock.json}'
  - '!**/__tests__/*'
  - '!**/*.test.ts'
  - '!**/*.test.tsx'
  - '!**/*.spec.ts'
  - '!**/*.spec.tsx'
  - '!node_modules/.vite/*'
  - '!node_modules/.cache/*'
asarUnpack:
  - resources/**
  - '**/*.node'
  - node_modules/better-sqlite3/**
win:
  executableName: ai-gui
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: AI GUI
  artifactName: AI-GUI-Setup-${version}.${ext}
mac:
  icon: build/icon.svg
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSDocumentsFolderUsageDescription: "AI GUI needs access to the Documents folder to save and load agent configurations."
  notarize: false
linux:
  icon: build/icon.svg
  target:
    - AppImage
  maintainer: ai-gui
  category: Development
publish: null
